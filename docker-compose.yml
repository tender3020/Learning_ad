services:
  db:
    image: mysql:8.4
    container_name: yizhi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: yizhi
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yizhi-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      # 覆盖 .env 中的 localhost，容器内通过服务名 db 访问 MySQL
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-123456}@db:3306/yizhi
    depends_on:
      db:
        condition: service_healthy

  # 首次部署或 schema 变更时执行：docker compose --profile setup run --rm migrate
  migrate:
    profiles: ["setup"]
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: yizhi-migrate
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-123456}@db:3306/yizhi
    depends_on:
      db:
        condition: service_healthy
    command: ["npm", "run", "db:push"]
    restart: "no"

volumes:
  mysql_data:
